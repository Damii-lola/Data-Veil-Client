<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Cipher – QR Output</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Custom Cipher</h1>
    <textarea id="inputText" rows="4" placeholder="Type your message..."></textarea>
    <button id="encryptBtn">Encrypt &amp; Generate QR</button>
    <div id="outputArea">
      <textarea id="outputText" rows="3" readonly placeholder="Encrypted hex will appear here..."></textarea>
      <img id="qrImage" style="display:none; max-width:100%;" alt="QR Code">
      <a id="downloadLink" style="display:none;" download="encrypted_qr.png">Download QR Image</a>
    </div>
    <p id="status"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
