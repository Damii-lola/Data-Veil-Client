<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Cipher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Custom Cipher</h1>
    <textarea id="inputText" rows="5" placeholder="Paste your text here..."></textarea>
    <div class="buttons">
      <button id="encryptBtn">Encrypt</button>
      <button id="decryptBtn">Decrypt</button>
    </div>
    <textarea id="outputText" rows="5" readonly placeholder="Result will appear here..."></textarea>
    <p id="status"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
